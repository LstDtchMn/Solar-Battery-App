; PlatformIO project for the KiloVault HLX+ -> PC ESP32 bridge.
;
;   pip install platformio
;   cd firmware/esp32_bridge
;   pio run -t upload       # flash the ESP32
;   pio device monitor      # watch the line protocol (optional)
;
; Then on the PC:  kvmon serve --serial COM3   (or /dev/ttyUSB0)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.2

build_flags =
    ; Allow up to 3 simultaneous battery connections.
    -D CONFIG_BT_NIMBLE_MAX_CONNECTIONS=3
    -D CONFIG_BT_NIMBLE_ROLE_CENTRAL=1
